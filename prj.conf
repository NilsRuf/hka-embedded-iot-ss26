# prj.conf is used to adjust configuration options to your needs.

# Configure logging backend
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
# Ability to print floats.
CONFIG_CBPRINTF_FP_SUPPORT=y

# Enable sensor API
CONFIG_SENSOR=y

# Some ergonomics for threads
CONFIG_THREAD_NAME=y

# ZBUS configuration
CONFIG_ZBUS=y
CONFIG_ZBUS_MSG_SUBSCRIBER=y
CONFIG_ZBUS_CHANNEL_NAME=y
CONFIG_ZBUS_OBSERVER_NAME=y

CONFIG_ENV_READING_DEFAULT_MEASUREMENT_INTERVAL_MS=8000
